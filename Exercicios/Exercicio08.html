    <title>Float e Clear</title>

</head>
<style>
    *{
        margin: 0;
    }
    .menu {
        background-color: blue;

        height: 600px;

        float: left;
        margin: 0;

    }

        background-color: blueviolet;
        height: 600px;

        float: left;
        margin: 0;
         text-align: center;
    }

    .roda {
        background-color:
            red;
        height: 200px;
        width: 100%;
    }

    .clear {
        clear: both;
    }
</style>

<body>
    <header>
